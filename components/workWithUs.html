<div class="container work-with-us-container" id="work-with-us">
    <h1 class="section-title text-center">
        <span>Lavora con noi</span>
    </h1>

    <div class="work-with-us-form">
        <form id="jobForm">

            <div class="row">

                <!-- NOMINATIVO -->
                <div class="mb-3">
                    <label>Nominativo</label>
                    <input type="text" id="nome" class="form-control" placeholder="es: Mario Rossi" required>
                </div>

                <!-- EMAIL -->
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="es: mario.rossi@mail.com" required>
                </div>

            </div>

            <!-- MESSAGGIO -->
            <div class="mb-3">
                <label>Messaggio</label>
                <textarea id="messaggio" class="form-control" rows="5"
                    placeholder="Scrivi una breve presentazione e raccontaci perché vuoi lavorare con noi..."
                    required></textarea>
            </div>

            <div class="d-flex gap-3 justify-content-center align-items-center">

                <!-- BTN RESET -->
                <button type="reset" class="btn-custom btn-reset-form">
                    <i class="bi bi-arrow-counterclockwise me-2"></i>
                    <span>Reimposta</span>
                </button>

                <!-- BTN INVIO -->
                <button type="submit" class="btn-custom">
                    <i class="bi bi-send-fill me-2"></i>
                    <span>Candidati</span>
                </button>

            </div>
        </form>
    </div>
</div>
