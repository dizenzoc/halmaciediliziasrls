<div class="container container-custom gallery-container">

    <div class="row">
        <div class="col-12 col-lg-10 col-xxl-8 mx-auto">
            <h1 class="section-title text-start title-gallery">
                <span class="title-first-part">I nostri</span>
                <br />
                <span class="title-second-part">lavori</span>
            </h1>
        </div>
    </div>

    <!-- GALLERY -->
    <div class="row">
        <div class="col-12 col-lg-10 col-xxl-8 mx-auto">

            <section class="gallery-container mx-auto">

                <ul class="gallery-images mx-auto" id="galleryImages"></ul>

                <div class="gallery-nav">
                    <button class="btn-custom prev my-auto" id="prevPage">
                        <i class="bi bi-arrow-left-short"></i>
                    </button>

                    <span class="page-info" id="pageInfo">Pagina 1</span>

                    <button class="btn-custom next my-auto" id="nextPage">
                        <i class="bi bi-arrow-right-short"></i>
                    </button>
                </div>

            </section>

        </div>
    </div>
</div>

<!-- IMG FULLSCREEN -->
<div class="lightbox" id="lightbox">
    <div class="lightbox-content p-relative">
        <button class="lightbox-close" id="closeLightbox">&times;</button>

        <button class="btn-custom lightbox-nav prev" id="lightboxPrev">
            <i class="bi bi-arrow-left-short"></i>
        </button>

        <button class="btn-custom lightbox-nav next" id="lightboxNext">
            <i class="bi bi-arrow-right-short"></i>
        </button>

        <div id="lightboxMedia" class="mx-auto"></div>
    </div>
</div>
